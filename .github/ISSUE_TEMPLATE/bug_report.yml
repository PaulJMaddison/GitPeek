name: Bug Report
description: File a bug report to help us improve RepoVista
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Tell us what you expected and what happened.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Device / OS / app version / branch
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
      render: shell
